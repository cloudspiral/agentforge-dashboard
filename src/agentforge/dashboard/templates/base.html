<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AgentForge{% endblock %}</title>
    <link rel="stylesheet" href="/static/agentforge.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/">AgentForge</a>
      <nav aria-label="Primary navigation">
        <a href="/dashboard/queue">Queue</a>
        <a href="/dashboard/campaigns">Campaigns</a>
        <a href="/dashboard/findings">Findings</a>
        <a href="/dashboard/regression-runs">Regressions</a>
      </nav>
    </header>
    <main>{% block content %}{% endblock %}</main>
    <footer>Synthetic-data, authorized targets only. Findings require evidence and human review.</footer>
    {% block scripts %}{% endblock %}
  </body>
</html>
