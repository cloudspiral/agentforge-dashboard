schema_version: "1.0"
updated_at: "2026-07-21"
roles:
  orchestrator:
    env: OPENAI_ORCHESTRATOR_MODEL
    default_model: gpt-5.6-terra
    reasoning_effort: low
    max_output_tokens: 900
    max_turns: 1
  attack_generator:
    env: OPENAI_ATTACK_MODEL
    default_model: gpt-5.6-terra
    reasoning_effort: low
    max_output_tokens: 1200
    max_turns: 1
  judge:
    env: OPENAI_JUDGE_MODEL
    default_model: gpt-5.6-terra
    reasoning_effort: low
    max_output_tokens: 1000
    max_turns: 1
    escalation:
      env: OPENAI_JUDGE_ESCALATION_MODEL
      model: gpt-5.6-sol
      only_when: deterministic_checks_are_ambiguous
      requires_budget_reservation: true
  documentation:
    env: OPENAI_DOCUMENTATION_MODEL
    default_model: gpt-5.6-luna
    reasoning_effort: low
    max_output_tokens: 1800
    max_turns: 1
common:
  store: false
  automatic_retries: 0
  trace_include_sensitive_data: false

