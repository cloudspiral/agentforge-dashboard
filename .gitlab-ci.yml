stages:
  - verify

# This pipeline is a post-merge repository verification check. The available
# Gauntlet instance runner is protected, so it cannot execute pipelines from
# ordinary merge-request branches. Railway deployment is independent and is
# triggered by the GitLab -> GitHub main-branch mirror.
workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never

default:
  image: ghcr.io/astral-sh/uv:0.11.25-python3.12-bookworm-slim
  interruptible: true
  before_script:
    - uv sync --frozen

variables:
  # Keep caches inside the disposable job workspace. No GitLab cache or build
  # artifact is retained by this pipeline.
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"
  UV_LINK_MODE: copy
  RUN_LIVE_E2E: "0"
  OPENAI_AGENTS_TRACE_INCLUDE_SENSITIVE_DATA: "0"
  OPENAI_AGENTS_DONT_LOG_MODEL_DATA: "1"
  OPENAI_AGENTS_DONT_LOG_TOOL_DATA: "1"
  OPENINFERENCE_HIDE_INPUTS: "true"
  OPENINFERENCE_HIDE_OUTPUTS: "true"
  OPENINFERENCE_HIDE_LLM_TOOLS: "true"
  OPENINFERENCE_HIDE_LLM_INVOCATION_PARAMETERS: "true"

  # The explicit _test suffix is enforced by the integration tests to prevent
  # destructive schema setup against a non-test database.
  POSTGRES_DB: agentforge_ci_test
  POSTGRES_USER: agentforge_ci
  POSTGRES_PASSWORD: agentforge_ci
  DATABASE_URL: postgresql+psycopg://agentforge_ci:agentforge_ci@postgres:5432/agentforge_ci_test
  AGENTFORGE_TEST_DATABASE_URL: postgresql+psycopg://agentforge_ci:agentforge_ci@postgres:5432/agentforge_ci_test

verify:
  stage: verify
  services:
    - name: postgres:17-alpine
      alias: postgres
  script:
    - uv run ruff format --check .
    - uv run ruff check .
    - uv run python scripts/export_contracts.py --check
    - uv run python scripts/export_evals.py --validate-only
    - uv run python scripts/check_submission_results.py
    - uv run python scripts/check_control_results.py
    - uv run alembic heads
    - uv run alembic upgrade head
    - uv run alembic current
    - uv run alembic check
    - uv run pytest -q
