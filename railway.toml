[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'alembic upgrade head && exec uvicorn agentforge.main:app --host 0.0.0.0 --port ${PORT:-8080} --workers 1'"
healthcheckPath = "/readyz"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
